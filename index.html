<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bắt Sao Băng Cùng Kabigon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #010008;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        #gw {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            border-radius: 20px;
            overflow: hidden;
            background: #05071a;
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.2);
        }

        canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #game-c {
            pointer-events: auto;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .hb {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .hb b {
            font-weight: 700;
            color: #c4b5fd;
            font-size: 16px;
        }

        #ss,
        #ws {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 2rem;
            background: rgba(2, 1, 12, 0.4);
            backdrop-filter: blur(8px);
            opacity: 1;
            transition: opacity 1.5s ease;
        }

        #ws {
            display: none;
            opacity: 0;
        }

        .panel-content {
            background: rgba(20, 15, 45, 0.65);
            border: 1px solid rgba(196, 181, 253, 0.3);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.5);
            transform: translateY(0);
            animation: floatUp 0.8s ease-out;
        }

        .stitle {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #c4b5fd, 0 0 20px #a78bfa;
            animation: pulseGlow 2s infinite alternate;
        }

        .ssub {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .ctext {
            font-size: 16px;
            font-weight: 600;
            color: #e0d4fc;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        button {
            font-family: inherit;
            outline: none;
        }

        .pbtn {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 40px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.5);
            transition: all 0.2s;
        }

        .pbtn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.8);
        }

        .ybtn,
        .nbtn {
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 32px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
        }

        .ybtn {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .ybtn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.6);
        }

        .nbtn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #7c3aed, #f59e0b);
            transition: width 0.3s ease-out;
            width: 0%;
            box-shadow: 0 0 10px #f59e0b;
        }

        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 10px #fde68a, 0 0 20px #f59e0b;
            }

            100% {
                text-shadow: 0 0 20px #fde68a, 0 0 40px #f59e0b, 0 0 60px #d97706;
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .highlight-star {
            color: #fde68a;
            /* Màu vàng sáng */
            font-weight: 700;
            text-shadow: 0 0 8px #f59e0b, 0 0 20px #fbbf24;
            /* Đổ bóng phát sáng */
            display: inline-block;
            animation: pulseText 1.5s infinite alternate;
            /* Hiệu ứng co giãn nhẹ */
        }

        @keyframes pulseText {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>

    <div id="gw">
        <canvas id="bg-c"></canvas>
        <canvas id="game-c"></canvas>
        <canvas id="fx-c"></canvas>

        <div id="hud">
            <div class="hb"><b id="sv">0</b> / 12 ⭐</div>
            <div class="hb">Mạng: <b id="lv" style="color: #fda4af;">6</b></div>
            <div class="hb"><b id="tv">30</b>s</div>
        </div>

        <div id="ss">
            <div class="panel-content">
                <div class="stitle">Giấc Mơ Của Kabigon ✨</div>
                <div class="ssub">Hãy dẫn bé Kabigon béo đi hái sao.<br>Thu thập đủ 12 ngôi sao để phép màu xuất hiện
                    nà!</div>
                <div class="progress-bar" style="opacity:0">
                    <div class="progress-fill" style="width:0%"></div>
                </div>
                <button class="pbtn" id="sb">Bắt Đầu Nhé</button>
            </div>
        </div>

        <div id="ws">
            <div class="panel-content">
                <div class="stitle" id="wt" style="color: #fde68a;">Gửi Bé... 🌠 ✨</div>
                <div class="ctext" id="cm" style="color: #fff;"></div>
                <div>
                    <button class="ybtn" id="yb">Tiếp tục... ✨</button>
                    <button class="nbtn" id="nb" style="display: none;">Để nghĩ xíu...</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const gw = document.getElementById('gw'), bgC = document.getElementById('bg-c'), gmC = document.getElementById('game-c'), fxC = document.getElementById('fx-c');
            const hud = document.getElementById('hud'), ss = document.getElementById('ss'), ws = document.getElementById('ws');
            const svEl = document.getElementById('sv'), lvEl = document.getElementById('lv'), tvEl = document.getElementById('tv');

            let W, H, bgx, gx, fx;
            let stars = [], shooters = [], particles = [], bgStars = [], fireflies = [];

            let lanterns = [], birds = [], bgDecor = { trees: [], decorations: [] };
            let megaStar = { x: 0, y: 0, vx: 0, vy: 0, alpha: 0, active: false };
            let score = 0, lives = 6, timeLeft = 30;
            let running = false, over = false, isWinAnimation = false, winTime = 0;

            let mx = 200, my = 400;
            let chibiX = 200, chibiFace = 1, chibiEmotion = 'normal', emotionTimer = 0;
            let catcherTrail = [];

            // Quản lý trạng thái hiển thị câu chuyện hậu màn chơi thắng
            let winStep = 1;
            let lastT = 0, spawnT = 0, gameT = 0, raf;

            // ================= MỚI: CẤU HÌNH ÂM THANH =================
            const bgmSfx = new Audio('bgm.mp3'); bgmSfx.loop = true; bgmSfx.volume = 0.4;
            const scoredSfx = new Audio('scored.mp3'); scoredSfx.volume = 0.5;
            const missedSfx = new Audio('missed.mp3'); missedSfx.volume = 0.5;
            const windSfx = new Audio('wind_shimmer.mp3'); windSfx.volume = 0.5;
            const wooshSfx = new Audio('star_woosh.mp3'); wooshSfx.volume = 0.6;
            const clickSfx = new Audio('click.mp3'); clickSfx.volume = 0.5;
            // Cờ kiểm soát âm thanh không bị lặp lại trong vòng lặp game
            let windPlay = false, wooshPlay = false;
            bgmSfx.play().catch(() => {
                // Nếu bị chặn, sẽ chờ người dùng chạm vào màn hình lần đầu tiên để phát
                const startBGM = () => {
                    bgmSfx.play().catch(e => console.log(e));
                    // Phát xong thì gỡ sự kiện này đi để không bị lặp lại
                    document.removeEventListener('click', startBGM);
                    document.removeEventListener('touchstart', startBGM);
                };
                document.addEventListener('click', startBGM);
                document.addEventListener('touchstart', startBGM);
            });
            // ==========================================================
            function playClickSound() {
                clickSfx.currentTime = 0; // Reset lại từ đầu để bấm nhanh không bị miss tiếng
                clickSfx.play().catch(e => console.log(e));
            }
            function getGroundY(x) {
                return H - 40 + Math.sin(x * 0.008) * 12 + Math.cos(x * 0.003) * 8;
            }

            function resize() {
                W = gw.offsetWidth; H = gw.offsetHeight;
                [bgC, gmC, fxC].forEach(c => { c.width = W; c.height = H });
                bgx = bgC.getContext('2d'); gx = gmC.getContext('2d'); fx = fxC.getContext('2d');
                chibiX = W / 2;
                buildBgScene();
            }

            function buildBgScene() {
                bgStars = []; fireflies = []; bgDecor.trees = []; bgDecor.decorations = [];

                for (let i = 0; i < 250; i++) {
                    bgStars.push({
                        x: Math.random() * W, y: Math.random() * (H * 0.8),
                        r: Math.random() * 1.2 + 0.2, a: Math.random() * 0.8 + 0.2,
                        twinkle: Math.random() * Math.PI * 2, twinkleSpeed: Math.random() * 0.02 + 0.005,
                        hue: Math.random() > 0.5 ? 240 : 280, layer: Math.random() > 0.8 ? 2 : (Math.random() > 0.5 ? 1 : 0)
                    });
                }

                for (let i = 0; i < 35; i++) {
                    fireflies.push({
                        x: Math.random() * W, y: H - Math.random() * (H * 0.4),
                        vx: (Math.random() - 0.5) * 0.6,
                        vy: (Math.random() - 0.5) * 0.3,
                        r: Math.random() * 1.8 + 0.8,
                        pulse: Math.random() * Math.PI * 2,
                        hue: Math.random() > 0.5 ? 60 : 320
                    });
                }

                const treeColors = ['#4c1d95', '#6d28d9', '#4338ca', '#5b21b6'];
                for (let i = 0; i < 6; i++) {
                    let tx = (W / 5) * i + (Math.random() - 0.5) * 30;
                    bgDecor.trees.push({
                        x: tx,
                        baseY: getGroundY(tx) + 5,
                        scale: Math.random() * 0.35 + 0.6,
                        color: treeColors[i % treeColors.length],
                        flip: Math.random() > 0.5
                    });
                }

                const flowerColors = ['#fbcfe8', '#fecdd3', '#e9d5ff', '#a78bfa'];
                for (let i = 0; i < 45; i++) {
                    let tx = Math.random() * W;
                    bgDecor.decorations.push({
                        x: tx,
                        y: getGroundY(tx) + 5 + Math.random() * 25,
                        type: Math.random() > 0.6 ? 'flower' : 'grass',
                        scale: Math.random() * 0.4 + 0.6,
                        color: flowerColors[Math.floor(Math.random() * flowerColors.length)]
                    });
                }
            }

            function drawCuteTree(ctx, tree) {
                ctx.save();
                ctx.translate(tree.x, tree.baseY);
                ctx.scale(tree.scale * (tree.flip ? -1 : 1), tree.scale);

                ctx.fillStyle = '#2e1065';
                ctx.beginPath();
                ctx.moveTo(-4, 0); ctx.quadraticCurveTo(-3, -15, -2, -25);
                ctx.lineTo(2, -25); ctx.quadraticCurveTo(3, -15, 4, 0);
                ctx.fill();

                ctx.fillStyle = tree.color;
                ctx.beginPath();
                ctx.arc(0, -35, 18, 0, Math.PI * 2);
                ctx.arc(-14, -25, 14, 0, Math.PI * 2);
                ctx.arc(14, -25, 14, 0, Math.PI * 2);
                ctx.arc(-8, -15, 10, 0, Math.PI * 2);
                ctx.arc(8, -15, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath(); ctx.arc(-6, -38, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, -28, 2.5, 0, Math.PI * 2); ctx.fill();

                ctx.restore();
            }

            function animateBg(ts) {
                bgx.clearRect(0, 0, W, H);

                let darkness = isWinAnimation ? Math.min(0.85, winTime * 0.25) : 0;

                const bgGradient = bgx.createLinearGradient(0, 0, 0, H);
                bgGradient.addColorStop(0, '#010008'); bgGradient.addColorStop(0.3, '#08051a');
                bgGradient.addColorStop(0.7, '#160a33'); bgGradient.addColorStop(1, '#05071a');
                bgx.fillStyle = bgGradient; bgx.fillRect(0, 0, W, H);

                for (const s of bgStars) {
                    s.twinkle += s.twinkleSpeed;
                    const baseA = s.layer === 2 ? s.a : (s.layer === 1 ? s.a * 0.6 : s.a * 0.3);
                    const a = baseA * (0.3 + 0.7 * Math.sin(s.twinkle)) * (1 - darkness);
                    bgx.beginPath(); bgx.arc(s.x, s.y, s.r * (s.layer === 2 ? 1.5 : 1), 0, Math.PI * 2);
                    bgx.fillStyle = `hsla(${s.hue}, 80%, 90%, ${a})`;
                    if (s.layer === 2) { bgx.shadowBlur = 8; bgx.shadowColor = `hsla(${s.hue}, 100%, 80%, ${a})`; }
                    else { bgx.shadowBlur = 0; }
                    bgx.fill();
                }
                bgx.shadowBlur = 0;

                bgDecor.trees.forEach(tree => drawCuteTree(bgx, tree));

                const hillGrad = bgx.createLinearGradient(0, H - 60, 0, H);
                hillGrad.addColorStop(0, '#3b0764');
                hillGrad.addColorStop(1, '#0f172a');

                bgx.fillStyle = hillGrad;
                bgx.beginPath();
                bgx.moveTo(0, H);
                for (let x = 0; x <= W; x += 5) {
                    bgx.lineTo(x, getGroundY(x));
                }
                bgx.lineTo(W, H);
                bgx.fill();

                bgx.strokeStyle = 'rgba(167, 139, 250, 0.4)';
                bgx.lineWidth = 3;
                bgx.beginPath();
                for (let x = 0; x <= W; x += 5) {
                    if (x === 0) bgx.moveTo(x, getGroundY(x));
                    else bgx.lineTo(x, getGroundY(x));
                }
                bgx.stroke();

                bgDecor.decorations.forEach(d => {
                    bgx.save();
                    bgx.translate(d.x, d.y);
                    bgx.scale(d.scale, d.scale);

                    if (d.type === 'flower') {
                        bgx.strokeStyle = '#34d399'; bgx.lineWidth = 2.5; bgx.lineCap = 'round';
                        bgx.beginPath(); bgx.moveTo(0, 0); bgx.lineTo(0, -8); bgx.stroke();

                        bgx.translate(0, -8);
                        bgx.fillStyle = d.color;
                        for (let p = 0; p < 5; p++) {
                            bgx.rotate(Math.PI * 2 / 5);
                            bgx.beginPath(); bgx.ellipse(0, -3.5, 2.5, 4.5, 0, 0, Math.PI * 2); bgx.fill();
                        }
                        bgx.fillStyle = '#fef08a';
                        bgx.beginPath(); bgx.arc(0, 0, 2.5, 0, Math.PI * 2); bgx.fill();
                    } else {
                        bgx.fillStyle = '#4c1d95';
                        bgx.beginPath();
                        bgx.arc(0, 0, 4, Math.PI, 0);
                        bgx.arc(-5, 2, 3, Math.PI, 0);
                        bgx.arc(5, 2, 3, Math.PI, 0);
                        bgx.fill();
                    }
                    bgx.restore();
                });

                for (const f of fireflies) {
                    f.x += Math.sin(f.pulse) * 0.2 + f.vx;
                    f.y += f.vy + Math.cos(f.pulse * 0.5) * 0.15;
                    f.pulse += 0.02;

                    if (f.y < H * 0.5) f.vy = Math.abs(f.vy) * 0.8;
                    if (f.y > H - 10) f.vy = -Math.abs(f.vy) * 0.8;
                    if (f.x < -10) f.x = W + 10;
                    if (f.x > W + 10) f.x = -10;

                    const fa = (0.3 + 0.5 * Math.sin(f.pulse)) * (1 - darkness);
                    if (fa > 0) {
                        bgx.beginPath(); bgx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                        bgx.fillStyle = `hsla(${f.hue}, 100%, 80%, ${fa})`;
                        bgx.shadowBlur = f.r * 5; bgx.shadowColor = `hsla(${f.hue}, 100%, 70%, ${fa})`;
                        bgx.fill();
                    }
                }
                bgx.shadowBlur = 0;

                if (isWinAnimation) {
                    bgx.fillStyle = `rgba(0, 0, 0, ${darkness})`;
                    bgx.fillRect(0, 0, W, H);

                    let moonRadius = 110;
                    let startY = H + moonRadius * 2;
                    let endY = H * 0.45;

                    let progress = Math.min(1, winTime / 4);
                    let easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                    let moonY = startY - (startY - endY) * easeProgress;
                    let moonA = Math.min(1, winTime * 0.4);

                    let pulse = Math.sin(winTime * 1.5) * 0.1;
                    let haloRadius = moonRadius * (3.5 + pulse);
                    let haloGrad = bgx.createRadialGradient(W / 2, moonY, moonRadius * 0.7, W / 2, moonY, haloRadius);
                    haloGrad.addColorStop(0, `rgba(255, 255, 255, ${moonA * 0.4})`);
                    haloGrad.addColorStop(0.3, `rgba(160, 200, 255, ${moonA * 0.15})`);
                    haloGrad.addColorStop(1, 'rgba(100, 150, 255, 0)');

                    bgx.fillStyle = haloGrad;
                    bgx.beginPath(); bgx.arc(W / 2, moonY, haloRadius, 0, Math.PI * 2); bgx.fill();

                    let moonGrad = bgx.createRadialGradient(W / 2, moonY - moonRadius * 0.3, 0, W / 2, moonY, moonRadius);
                    moonGrad.addColorStop(0, `rgba(255, 255, 255, ${moonA})`);
                    moonGrad.addColorStop(0.6, `rgba(240, 245, 255, ${moonA})`);
                    moonGrad.addColorStop(1, `rgba(180, 200, 230, ${moonA})`);

                    bgx.shadowBlur = 50 + pulse * 10;
                    bgx.shadowColor = `rgba(200, 220, 255, ${moonA})`;
                    bgx.fillStyle = moonGrad;
                    bgx.beginPath(); bgx.arc(W / 2, moonY, moonRadius, 0, Math.PI * 2); bgx.fill();
                    bgx.shadowBlur = 0;

                } else {
                    const mx2 = W * 0.85, my2 = H * 0.18, mr = 25;
                    bgx.shadowBlur = 30; bgx.shadowColor = '#d8b4fe';
                    bgx.fillStyle = '#fff9eb'; bgx.beginPath(); bgx.arc(mx2, my2, mr, 0, Math.PI * 2); bgx.fill(); bgx.shadowBlur = 0;
                }
            }

            function spawnStar() {
                if (isWinAnimation) return;
                const fromLeft = Math.random() < 0.5;
                const sx = fromLeft ? -20 : W + 20;
                const sy = Math.random() * H * 0.25;
                const angle = fromLeft ? (Math.random() * 0.3 + 0.5) : (Math.PI - Math.random() * 0.3 - 0.5);
                const speed = Math.random() * 2 + 1.5;
                shooters.push({
                    x: sx, y: sy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    tail: [], size: Math.random() * 2 + 3.5, hue: Math.random() * 60 + 260,
                    caught: false, missed: false, alpha: 1
                });
            }

            function drawStar5(ctx, x, y, r, color, alpha, blur = 15) {
                ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color;
                ctx.shadowBlur = blur; ctx.shadowColor = color; ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const a = Math.PI / 2 + i * Math.PI * 2 / 5; const b = a + Math.PI / 5;
                    if (i === 0) ctx.moveTo(x + Math.cos(a) * r, y - Math.sin(a) * r);
                    else ctx.lineTo(x + Math.cos(a) * r, y - Math.sin(a) * r);
                    ctx.lineTo(x + Math.cos(b) * r * 0.42, y - Math.sin(b) * r * 0.42);
                }
                ctx.closePath(); ctx.fill(); ctx.restore();
            }

            function drawChibi(cx, cy, face, emotion) {
                if (isWinAnimation && winTime > 2) return;
                gx.save();
                if (isWinAnimation) gx.globalAlpha = Math.max(0, 1 - (winTime / 2));
                gx.translate(cx, cy);

                const bodyColor = '#445b71';
                const bellyColor = '#fcf3e3';
                const pawColor = '#b08d6a';

                let ex = face * 4;

                gx.fillStyle = bodyColor;
                gx.beginPath(); gx.moveTo(-16, -20); gx.lineTo(-24, -40); gx.lineTo(-4, -30); gx.fill();
                gx.beginPath(); gx.moveTo(16, -20); gx.lineTo(24, -40); gx.lineTo(4, -30); gx.fill();

                gx.beginPath();
                gx.moveTo(0, -32);
                gx.bezierCurveTo(25, -32, 42, -10, 45, 15);
                gx.bezierCurveTo(45, 35, 25, 45, 0, 45);
                gx.bezierCurveTo(-25, 45, -45, 35, -45, 15);
                gx.bezierCurveTo(-42, -10, -25, -32, 0, -32);
                gx.fill();

                gx.fillStyle = bellyColor;
                gx.beginPath();
                gx.moveTo(0, 42);
                gx.bezierCurveTo(35, 42, 38, 10, 25, -10);
                gx.bezierCurveTo(18, -25, 10, -25, 0, -18);
                gx.bezierCurveTo(-10, -25, -18, -25, -25, -10);
                gx.bezierCurveTo(-38, 10, -35, 42, 0, 42);
                gx.fill();

                gx.strokeStyle = bodyColor; gx.lineWidth = 14; gx.lineCap = 'round';
                gx.beginPath(); gx.moveTo(-28, 5); gx.lineTo(-38, -10); gx.stroke();
                gx.beginPath(); gx.moveTo(28, 5); gx.lineTo(38, -10); gx.stroke();

                gx.fillStyle = '#fff';
                [[-42, -12], [-38, -16], [-34, -12]].forEach(p => { gx.beginPath(); gx.arc(p[0], p[1], 2.5, 0, Math.PI * 2); gx.fill(); });
                [[42, -12], [38, -16], [34, -12]].forEach(p => { gx.beginPath(); gx.arc(p[0], p[1], 2.5, 0, Math.PI * 2); gx.fill(); });

                gx.fillStyle = bellyColor;
                gx.beginPath(); gx.ellipse(-22, 35, 14, 12, -Math.PI / 6, 0, Math.PI * 2); gx.fill();
                gx.strokeStyle = bodyColor; gx.lineWidth = 3; gx.stroke();
                gx.beginPath(); gx.ellipse(22, 35, 14, 12, Math.PI / 6, 0, Math.PI * 2); gx.fill();
                gx.stroke();

                gx.fillStyle = pawColor;
                gx.beginPath(); gx.ellipse(-22, 35, 6, 5, -Math.PI / 6, 0, Math.PI * 2); gx.fill();
                gx.beginPath(); gx.ellipse(22, 35, 6, 5, Math.PI / 6, 0, Math.PI * 2); gx.fill();

                gx.fillStyle = '#fff';
                [[-32, 28], [-26, 24], [-18, 25]].forEach(p => {
                    gx.beginPath(); gx.moveTo(p[0], p[1]); gx.lineTo(p[0] + 2, p[1] - 5); gx.lineTo(p[0] + 4, p[1]); gx.fill();
                });
                [[32, 28], [26, 24], [18, 25]].forEach(p => {
                    gx.beginPath(); gx.moveTo(p[0], p[1]); gx.lineTo(p[0] - 2, p[1] - 5); gx.lineTo(p[0] - 4, p[1]); gx.fill();
                });

                gx.fillStyle = '#ff8a8a';
                gx.beginPath(); gx.ellipse(-16 + ex, -5, 6, 4.5, 0, 0, Math.PI * 2); gx.fill();
                gx.beginPath(); gx.ellipse(16 + ex, -5, 6, 4.5, 0, 0, Math.PI * 2); gx.fill();

                gx.strokeStyle = '#1e293b'; gx.lineWidth = 2.5;
                if (emotion === 'happy') {
                    gx.beginPath(); gx.moveTo(-12 + ex, -10); gx.quadraticCurveTo(-8 + ex, -14, -4 + ex, -10); gx.stroke();
                    gx.beginPath(); gx.moveTo(12 + ex, -10); gx.quadraticCurveTo(8 + ex, -14, 4 + ex, -10); gx.stroke();
                    gx.fillStyle = '#ec4899';
                    gx.beginPath(); gx.arc(ex, -2, 6, 0, Math.PI); gx.fill();
                    gx.fillStyle = '#fff';
                    gx.beginPath(); gx.moveTo(-4 + ex, -2); gx.lineTo(-2 + ex, 2); gx.lineTo(0 + ex, -2); gx.fill();
                    gx.beginPath(); gx.moveTo(4 + ex, -2); gx.lineTo(2 + ex, 2); gx.lineTo(0 + ex, -2); gx.fill();
                } else if (emotion === 'sad') {
                    gx.beginPath(); gx.moveTo(-12 + ex, -12); gx.lineTo(-4 + ex, -9); gx.stroke();
                    gx.beginPath(); gx.moveTo(12 + ex, -12); gx.lineTo(4 + ex, -9); gx.stroke();
                    gx.fillStyle = '#38bdf8';
                    gx.beginPath(); gx.arc(15 + ex, -15, 3.5, 0, Math.PI * 2); gx.fill();
                    gx.beginPath(); gx.moveTo(15 + ex, -22); gx.lineTo(11.5 + ex, -15); gx.lineTo(18.5 + ex, -15); gx.fill();
                    gx.beginPath(); gx.arc(ex, 0, 3, Math.PI, 0); gx.stroke();
                } else {
                    gx.beginPath(); gx.moveTo(-12 + ex, -10); gx.lineTo(-4 + ex, -10); gx.stroke();
                    gx.beginPath(); gx.moveTo(12 + ex, -10); gx.lineTo(4 + ex, -10); gx.stroke();
                    gx.beginPath(); gx.moveTo(-2 + ex, -4); gx.lineTo(2 + ex, -4); gx.stroke();
                    gx.fillStyle = '#fff';
                    gx.beginPath(); gx.moveTo(-2 + ex, -4); gx.lineTo(-1 + ex, -7); gx.lineTo(0 + ex, -4); gx.fill();
                    gx.beginPath(); gx.moveTo(2 + ex, -4); gx.lineTo(1 + ex, -7); gx.lineTo(0 + ex, -4); gx.fill();

                    if (!isWinAnimation) {
                        gx.fillStyle = 'rgba(255,255,255,0.8)';
                        gx.font = "bold 16px Quicksand";
                        let zOff = Math.sin(Date.now() * 0.002) * 4;
                        gx.fillText("z", -35, -35 + zOff);
                        gx.font = "bold 22px Quicksand";
                        gx.fillText("Z", -45, -50 + zOff * 1.2);
                    }
                }
                gx.restore();
            }

            function drawCatcher(bx, by) {
                if (isWinAnimation) return;

                catcherTrail.push({ x: bx, y: by, alpha: 0.8 });
                if (catcherTrail.length > 8) catcherTrail.shift();
                for (let i = 0; i < catcherTrail.length - 1; i++) {
                    const t = catcherTrail[i]; const a = t.alpha * (i / catcherTrail.length) * 0.4;
                    gx.beginPath(); gx.arc(t.x, t.y, 8 * (i / catcherTrail.length), 0, Math.PI * 2);
                    gx.fillStyle = `rgba(253, 230, 138, ${a})`; gx.fill();
                }

                gx.save();
                gx.translate(bx, by);

                gx.shadowBlur = 20; gx.shadowColor = '#fbbf24';
                gx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                gx.strokeStyle = '#fef08a'; gx.lineWidth = 4;

                gx.beginPath();
                gx.moveTo(-45, 0);
                gx.bezierCurveTo(-45, -25, -20, -35, 0, -15);
                gx.bezierCurveTo(20, -35, 45, -25, 45, 0);
                gx.bezierCurveTo(55, 25, 30, 35, 15, 25);
                gx.bezierCurveTo(0, 45, -15, 45, -15, 25);
                gx.bezierCurveTo(-30, 35, -55, 25, -45, 0);

                gx.fill();
                gx.stroke();

                gx.shadowBlur = 0;
                let grd = gx.createRadialGradient(0, 0, 5, 0, 0, 45);
                grd.addColorStop(0, 'rgba(253, 230, 138, 0.4)');
                grd.addColorStop(1, 'rgba(245, 158, 11, 0.0)');
                gx.fillStyle = grd;
                gx.fill();

                for (let i = 0; i < 6; i++) {
                    let sx = (Math.random() - 0.5) * 70; let sy = (Math.random() - 0.5) * 40;
                    gx.fillStyle = '#fff';
                    gx.beginPath(); gx.arc(sx, sy, Math.random() * 2 + 0.5, 0, Math.PI * 2); gx.fill();
                }
                gx.restore();
            }

            function drawShooters(netX, netY) {
                for (let i = shooters.length - 1; i >= 0; i--) {
                    const s = shooters[i];
                    if (s.caught) {
                        s.alpha -= 0.08; s.y -= 2;
                        if (s.alpha <= 0) { shooters.splice(i, 1); continue; }
                    } else if (s.missed) {
                        s.alpha -= 0.05;
                        if (s.alpha <= 0) { shooters.splice(i, 1); continue; }
                    } else {
                        s.tail.push({ x: s.x, y: s.y });
                        if (s.tail.length > 30) s.tail.shift();
                        s.x += s.vx; s.y += s.vy; s.vy += 0.025;

                        if (s.y > H + 20) {
                            if (s.x > 0 && s.x < W && !s.missed) {
                                s.missed = true;
                                if (!isWinAnimation) {
                                    // BẬT ÂM THANH TRƯỢT SAO
                                    missedSfx.currentTime = 0;
                                    missedSfx.play().catch(e => console.log(e));

                                    chibiEmotion = 'sad'; emotionTimer = 40;
                                    lives = Math.max(0, lives - 1); lvEl.textContent = lives;
                                    if (lives <= 0 && !over) triggerLose();
                                }
                            } else if (!s.missed) { shooters.splice(i, 1); continue; }
                        } else if (s.x < -100 || s.x > W + 100) { shooters.splice(i, 1); continue; }

                        const dist = Math.hypot(s.x - netX, s.y - netY);

                        if (dist < 55 && !isWinAnimation) {
                            s.caught = true;
                            // BẬT ÂM THANH BẮT TRÚNG SAO
                            scoredSfx.currentTime = 0;
                            scoredSfx.play().catch(e => console.log(e));

                            chibiEmotion = 'happy'; emotionTimer = 40;
                            score = Math.min(score + 1, 12); svEl.textContent = score;
                            updateProgress();
                            for (let p = 0; p < 20; p++) {
                                particles.push({
                                    x: s.x, y: s.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                                    alpha: 1, r: Math.random() * 3 + 1, hue: s.hue, life: 0
                                });
                            }
                            if (score >= 12 && !over) startWinAnimation();
                        }
                    }
                    if (s.tail.length > 1) {
                        const tailGradient = gx.createLinearGradient(s.tail[0].x, s.tail[0].y, s.x, s.y);
                        tailGradient.addColorStop(0, `hsla(${s.hue}, 100%, 80%, 0)`);
                        tailGradient.addColorStop(1, `hsla(${s.hue}, 100%, 90%, ${s.alpha * 0.8})`);
                        gx.beginPath(); gx.strokeStyle = tailGradient; gx.lineWidth = s.size * 1.5; gx.lineCap = 'round';
                        gx.moveTo(s.tail[0].x, s.tail[0].y);
                        for (let t = 1; t < s.tail.length; t++) gx.lineTo(s.tail[t].x, s.tail[t].y);
                        gx.stroke();
                    }
                    drawStar5(gx, s.x, s.y, s.size * (s.caught ? 1.8 : 1), `hsl(${s.hue}, 100%, 95%)`, s.alpha);
                }
            }

            function drawParticles() {
                if (isWinAnimation) return;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life += 0.025;
                    p.alpha = Math.max(0, 1 - p.life);
                    if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                    gx.beginPath(); gx.arc(p.x, p.y, p.r * (1 - p.life), 0, Math.PI * 2);
                    gx.fillStyle = `hsla(${p.hue}, 90%, 85%, ${p.alpha})`;
                    gx.shadowBlur = 8; gx.shadowColor = `hsla(${p.hue}, 90%, 80%, ${p.alpha})`;
                    gx.fill(); gx.shadowBlur = 0;
                }
            }

            function drawLantern(ctx, l) {
                ctx.save();
                ctx.globalAlpha = l.alpha;
                let sway = Math.sin(winTime * 2 + l.offset) * 15 * (l.size / 6);
                let currentX = l.x + sway;
                ctx.shadowBlur = l.size * 3; ctx.shadowColor = '#f59e0b';
                ctx.beginPath(); ctx.ellipse(currentX, l.y, l.size, l.size * 1.4, 0, 0, Math.PI * 2);
                let grad = ctx.createLinearGradient(currentX, l.y - l.size, currentX, l.y + l.size);
                grad.addColorStop(0, '#fde68a'); grad.addColorStop(0.6, '#ea580c'); grad.addColorStop(1, '#9a3412');
                ctx.fillStyle = grad; ctx.fill();
                ctx.beginPath(); ctx.arc(currentX, l.y + l.size * 0.5, l.size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = l.size * 4; ctx.shadowColor = '#fff'; ctx.fill();
                ctx.restore();
            }

            function drawBird(ctx, x, y, scale, phase, alpha) {
                ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale); ctx.rotate(-0.15);
                ctx.fillStyle = `rgba(10, 12, 25, ${alpha})`;
                let wing = Math.sin(phase) * 12;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-12, -10 + wing, -22, -wing);
                ctx.quadraticCurveTo(-10, 2, 0, 5); ctx.quadraticCurveTo(10, 2, 22, -wing); ctx.quadraticCurveTo(12, -10 + wing, 0, 0); ctx.fill();
                ctx.restore();
            }

            function startWinAnimation() {
                isWinAnimation = true; over = true;
                winTime = 0; hud.style.opacity = '0';
                winStep = 1;
                lanterns = []; birds = [];
                megaStar = { x: W + 50, y: 30, vx: -5, vy: 1.5, alpha: 0, active: false };

                // MỚI: Reset trạng thái âm thanh chiến thắng & Bật to nhạc nền
                windPlay = false; wooshPlay = false;

                for (let i = 0; i < 150; i++) {
                    let scale = Math.random() > 0.8 ? (Math.random() * 4 + 6) : (Math.random() * 3 + 2);
                    lanterns.push({
                        x: Math.random() * W, y: H + Math.random() * H * 1.5 + 50,
                        size: scale, vy: -(Math.random() * 0.8 + 0.5) * (scale / 4),
                        offset: Math.random() * Math.PI * 2, alpha: 0
                    });
                }
                for (let i = 0; i < 8; i++) {
                    birds.push({
                        x: -50 - Math.random() * 150, y: H * 0.45 - Math.random() * 80 + (i * 15),
                        speed: Math.random() * 0.8 + 0.6, scale: Math.random() * 0.4 + 0.4, phase: Math.random() * Math.PI * 2
                    });
                }
            }

            function drawWinAnimation(dt) {
                winTime += dt / 1000;
                fx.clearRect(0, 0, W, H);

                // MỚI: Giây 1.5 - Phát tiếng chuông gió lấp lánh khi đèn lồng bay lên
                if (winTime > 1.5 && !windPlay) {
                    windSfx.play().catch(e => console.log(e));
                    windPlay = true;
                }

                // MỚI: Giây 3.5 - Phát tiếng bay lướt qua khi ngôi sao khổng lồ xuất hiện
                if (winTime > 3.5) {
                    if (!wooshPlay) {
                        wooshSfx.play().catch(e => console.log(e));
                        wooshPlay = true;
                    }

                    megaStar.active = true; megaStar.x += megaStar.vx; megaStar.y += megaStar.vy;
                    if (megaStar.alpha < 1) megaStar.alpha += 0.05;
                    let grad = fx.createLinearGradient(megaStar.x, megaStar.y, megaStar.x - megaStar.vx * 40, megaStar.y - megaStar.vy * 40);
                    grad.addColorStop(0, `rgba(255, 255, 255, ${megaStar.alpha})`); grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    fx.beginPath(); fx.moveTo(megaStar.x, megaStar.y); fx.lineTo(megaStar.x - megaStar.vx * 40, megaStar.y - megaStar.vy * 40);
                    fx.lineWidth = 3; fx.strokeStyle = grad; fx.lineCap = 'round'; fx.stroke();
                    fx.beginPath(); fx.arc(megaStar.x, megaStar.y, 2.5, 0, Math.PI * 2);
                    fx.fillStyle = '#fff'; fx.shadowBlur = 15; fx.shadowColor = '#fff'; fx.fill(); fx.shadowBlur = 0;
                }

                if (winTime > 2.5) {
                    birds.forEach(b => {
                        b.x += b.speed; b.y -= b.speed * 0.15; b.phase += 0.08;
                        let distToMoonCenter = Math.abs(b.x - W / 2);
                        let birdAlpha = Math.max(0, 1 - (distToMoonCenter / (W * 0.8)));
                        drawBird(fx, b.x, b.y, b.scale, b.phase, birdAlpha);
                    });
                }

                for (let i = 0; i < lanterns.length; i++) {
                    let l = lanterns[i];
                    if (winTime > 1.5) { l.y += l.vy; if (l.alpha < 1) l.alpha += 0.01; }
                    if (l.y < -50) { l.y = H + 50; l.x = Math.random() * W; }
                    if (l.alpha > 0) drawLantern(fx, l);
                }

                if (winTime > 6 && ws.style.display !== 'flex') {
                    // MỚI: Giây thứ 6 - Phát tiếng chuyển tiếp khi bảng thông báo chiến thắng xuất hiện
                    document.getElementById('wt').textContent = 'Gửi bé... ✨';
                    document.getElementById('cm').innerHTML = "Ngàn ngọn đèn trời mang theo lời hồi đáp...";
                    document.getElementById('yb').textContent = 'Tiếp tục... ✨';
                    document.getElementById('nb').style.display = 'none';

                    ws.style.display = 'flex';
                    setTimeout(() => ws.style.opacity = '1', 50);
                }
            }

            function triggerLose() {
                over = true; running = false; cancelAnimationFrame(raf);
                setTimeout(() => {
                    ws.style.display = 'flex'; ws.style.opacity = '0';
                    setTimeout(() => ws.style.opacity = '1', 50);
                    document.getElementById('wt').textContent = 'Éccc, thua mất tiu rùiiii... 😢';
                    document.getElementById('wt').style.color = '#fff';
                    document.getElementById('cm').innerHTML = 'Thử lại lần nữa để gọi phép màu cùng Kabigon nha :3 Bé ơi cố lên!!!';
                    document.getElementById('yb').textContent = 'Thử lại lần nữa :3';
                    document.getElementById('yb').onclick = () => { ws.style.display = 'none'; playClickSound(); startGame(); };
                    document.getElementById('nb').style.display = 'none';
                }, 500);
            }

            function updateProgress() {
                const pf = document.querySelector('.progress-fill');
                if (pf) pf.style.width = (score / 12 * 100) + '%';
            }

            function loop(ts) {
                const dt = Math.min(ts - lastT, 50); lastT = ts;
                animateBg(ts);
                gx.clearRect(0, 0, W, H);

                if (running && !isWinAnimation) {
                    spawnT += dt; gameT += dt;
                    const interval = Math.max(700, 1500 - score * 40);
                    while (spawnT >= interval) { spawnStar(); spawnT -= interval; }

                    const nt = Math.max(0, 30 - Math.floor(gameT / 1000));
                    if (nt !== timeLeft) { timeLeft = nt; tvEl.textContent = timeLeft; }
                    if (timeLeft <= 0 && !over) triggerLose();
                }

                let targetX = Math.min(Math.max(mx, 50), W - 50);
                chibiX += (targetX - chibiX) * 0.12;
                let speedX = targetX - chibiX;

                if (speedX > 1.5) chibiFace = 1;
                else if (speedX < -1.5) chibiFace = -1;

                if (emotionTimer > 0) emotionTimer--;
                else chibiEmotion = 'normal';

                let bob = Math.sin(gameT * 0.008) * Math.min(Math.abs(speedX) * 0.15, 2);
                if (Math.abs(speedX) < 1) bob = Math.sin(gameT * 0.005) * 1.5;

                const netY = getGroundY(chibiX) - 55 + bob;
                const chibiY = getGroundY(chibiX) - 18 + bob;

                drawChibi(chibiX, chibiY, chibiFace, chibiEmotion);
                drawCatcher(chibiX, netY);
                drawShooters(chibiX, netY);
                drawParticles();

                if (isWinAnimation) {
                    drawWinAnimation(dt);
                } else {
                    fx.clearRect(0, 0, W, H);
                }

                if (running || isWinAnimation) raf = requestAnimationFrame(loop);
            }

            function startGame() {
                score = 0; lives = 6; timeLeft = 30;
                shooters = []; particles = []; catcherTrail = []; lanterns = []; birds = [];
                over = false; isWinAnimation = false; spawnT = 0; gameT = 0;
                chibiEmotion = 'normal'; emotionTimer = 0;
                svEl.textContent = '0'; lvEl.textContent = '6'; tvEl.textContent = '30';
                hud.style.opacity = '1';
                fx.clearRect(0, 0, W, H);
                updateProgress();
                running = true; lastT = performance.now();
                bgmSfx.volume = 0.4; // Trả nhạc nền về mức êm dịu khi bắt đầu
                raf = requestAnimationFrame(loop);
            }

            document.getElementById('sb').onclick = () => {
                playClickSound();
                // MỚI: Bật nhạc nền BGM khi bấm nút bắt đầu
                bgmSfx.play().catch(e => console.log("Trình duyệt chặn autoplay audio", e));

                ss.style.opacity = '0';
                setTimeout(() => { ss.style.display = 'none'; startGame(); }, 800);
            };

            // === XỬ LÝ SỰ KIỆN ĐIỀU HƯỚNG DIALOGUE KHI THẮNG GAME ===
            document.getElementById('yb').onclick = () => {
                playClickSound();
                if (score >= 12) {
                    if (winStep === 1) {
                        winStep = 2;
                        document.getElementById('cm').innerHTML = "Hôm nay là ngày 06/06/2026.<br>Anh nghĩ đây là một ngày rất là đẹp.";
                    } else if (winStep === 2) {
                        winStep = 3;
                        document.getElementById('cm').innerHTML = 'Anh đã đợi ngày này đến cũng khá lâu òi.<br>Và hôm nay anh có điều muốn nói với bé!';
                    } else if (winStep == 3) {
                        winStep = 4;
                        document.getElementById('cm').innerHTML = 'Bé có biết vì sao anh lại đặt mốc 12 ngôi sao<br>để Kabigon thu thập hơm?';
                    } else if (winStep === 4) {
                        winStep = 5;
                        document.getElementById('cm').innerHTML = "Bởi vì 12 ngôi sao này đại diện cho<br>12 tháng trong năm anh muốn ở cạnh bé :3";
                    } else if (winStep === 5) {
                        winStep = 6;
                        document.getElementById('cm').innerHTML = "Và hôm nay anh muốn tự tay kích hoạt<br><span class='highlight-star'>'ngôi sao thứ 13'</span>, ngôi sao đó chính là bé!";
                        for (let i = 0; i < 40; i++) {
                            particles.push({
                                x: W / 2 + (Math.random() - 0.5) * 200,
                                y: H * 0.4 + (Math.random() - 0.5) * 100,
                                vx: (Math.random() - 0.5) * 8,
                                vy: (Math.random() - 0.5) * 8,
                                alpha: 1,
                                r: Math.random() * 4 + 2,
                                hue: 45, // Tone màu vàng tinh tú
                                life: 0
                            });
                        }
                    } else if (winStep === 6) {
                        winStep = 7;
                        document.getElementById('cm').innerHTML = 'Bé có muốn tiến thêm một bước,<br>làm ngôi sao sáng nhất trong lòng anh hong?';
                        document.getElementById('yb').textContent = 'Có ạ :>>';

                        const nb = document.getElementById('nb');
                        nb.style.display = 'inline-block';
                        nb.style.position = 'static';
                    } else if (winStep === 7) {
                        document.getElementById('wt').innerHTML = 'Awww!!!<br>Thiệt là hạnh phúc quá đi à :3';
                        document.getElementById('cm').innerHTML = 'Xin cảm ơn bé vì đã trở thành ngôi sao sáng nhất trong lòng anh! Hy vọng chúng mình cùng tạo nên thiệt là nhiều kỷ niệm đẹp nà :3';
                        document.getElementById('yb').style.display = 'none';
                        document.getElementById('nb').style.display = 'none';
                    }
                }
            };

            function runawayButton() {
                const nb = document.getElementById('nb');
                nb.style.position = 'absolute';

                // Thu hẹp biên an toàn (trừ hao padding 40px và kích thước nút)
                const padding = 50;
                const maxX = ws.clientWidth - nb.clientWidth - padding;
                const maxY = ws.clientHeight - nb.clientHeight - padding;

                // Tính toán vị trí ngẫu nhiên nằm gọn trong khung hiển thị
                const randomX = Math.max(padding, Math.random() * maxX);
                const randomY = Math.max(padding, Math.random() * maxY);

                nb.style.left = randomX + 'px';
                nb.style.top = randomY + 'px';
            }

            // Click vào nút cũng sẽ tự chạy đi
            document.getElementById('nb').onclick = () => {
                playClickSound();
                runawayButton();
            };

            // Rê chuột vào cũng tự chạy đi (Bật sẵn để chạy mượt cả trên PC)
            // document.getElementById('nb').onmouseenter = () => {
            //     if (winStep === 7) {
            //         runawayButton();
            //     }
            // };

            gw.addEventListener('mousemove', e => { const r = gmC.getBoundingClientRect(); mx = e.clientX - r.left; });
            gw.addEventListener('touchmove', e => { e.preventDefault(); const r = gmC.getBoundingClientRect(); mx = e.touches[0].clientX - r.left; }, { passive: false });

            resize();
            window.addEventListener('resize', () => { resize(); if (!running && !isWinAnimation) animateBg(0); });
        })();
    </script>
</body>

</html>
