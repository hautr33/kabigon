<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bắt Sao Băng Cùng Kabigon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #010008;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        #gw {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            border-radius: 20px;
            overflow: hidden;
            background: #05071a;
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.2);
        }

        canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #game-c {
            pointer-events: auto;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .hb {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .hb b {
            font-weight: 700;
            color: #c4b5fd;
            font-size: 16px;
        }

        #ss,
        #ws {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 2rem;
            background: rgba(2, 1, 12, 0.4);
            backdrop-filter: blur(8px);
            opacity: 1;
            transition: opacity 1.5s ease;
        }

        #ws {
            display: none;
            opacity: 0;
        }

        .panel-content {
            background: rgba(20, 15, 45, 0.65);
            border: 1px solid rgba(196, 181, 253, 0.3);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.5);
            transform: translateY(0);
            animation: floatUp 0.8s ease-out;
        }

        .stitle {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #c4b5fd, 0 0 20px #a78bfa;
            animation: pulseGlow 2s infinite alternate;
        }

        .ssub {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .ctext {
            font-size: 16px;
            font-weight: 600;
            color: #e0d4fc;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        button {
            font-family: inherit;
            outline: none;
        }

        .pbtn {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 40px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.5);
            transition: all 0.2s;
        }

        .pbtn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.8);
        }

        .ybtn,
        .nbtn {
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 32px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
        }

        .ybtn {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .ybtn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.6);
        }

        .nbtn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #7c3aed, #f59e0b);
            transition: width 0.3s ease-out;
            width: 0%;
            box-shadow: 0 0 10px #f59e0b;
        }

        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 10px #fde68a, 0 0 20px #f59e0b;
            }

            100% {
                text-shadow: 0 0 20px #fde68a, 0 0 40px #f59e0b, 0 0 60px #d97706;
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .highlight-star {
            color: #fde68a;
            font-weight: 700;
            text-shadow: 0 0 8px #f59e0b, 0 0 20px #fbbf24;
            display: inline-block;
            animation: pulseText 1.5s infinite alternate;
        }

        @keyframes pulseText {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>
    <div id="gw">
        <canvas id="bg-c"></canvas>
        <canvas id="game-c"></canvas>
        <canvas id="fx-c"></canvas>

        <div id="hud">
            <div class="hb"><b id="sv">0</b> / <span id="tg">12</span> ⭐</div>
            <div class="hb">Mạng: <b id="lv" style="color: #fda4af;">6</b></div>
            <div class="hb"><b id="tv">30</b>s</div>
        </div>

        <div id="ss">
            <div class="panel-content">
                <div class="stitle">Giấc Mơ Của Kabigon ✨</div>
                <div class="ssub">Hãy dẫn bé Kabigon béo đi hái sao.<br>Thu thập đủ 12 ngôi sao để phép màu xuất hiện
                    nà!</div>
                <div class="progress-bar" style="opacity:0">
                    <div class="progress-fill" style="width:0%"></div>
                </div>
                <button class="pbtn" id="sb">Bắt Đầu Nhé</button>
            </div>
        </div>

        <div id="ws">
            <div class="panel-content">
                <div class="stitle" id="wt" style="color: #fde68a;">Gửi Bé Trăm... 🌠 ✨</div>
                <div class="ctext" id="cm" style="color: #fff;"></div>
                <div>
                    <button class="ybtn" id="yb">Tiếp tục... ✨</button>
                    <button class="nbtn" id="nb" style="display: none;">Để nghĩ xíu...</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="graphics.js"></script>
    <script src="easter_eggs.js"></script>
    <script src="main.js"></script>
</body>

</html>
